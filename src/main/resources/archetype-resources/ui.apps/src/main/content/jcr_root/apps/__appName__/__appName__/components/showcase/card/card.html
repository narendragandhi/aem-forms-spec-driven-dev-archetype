<sly data-sly-use.model="${package}.core.models.Card"
     data-sly-use.template="core/wcm/components/commons/v1/templates.html"
     data-sly-test.hasContent="${model.cardTitle || model.cardText}">
    <div class="card-showcase">
        <div class="card-image" data-sly-if="${model.imagePath}">
            <img src="${model.imagePath}" alt="${model.cardTitle}" />
        </div>
        <div class="card-content">
            <h3 class="card-title" data-sly-if="${model.cardTitle}">${model.cardTitle}</h3>
            <p class="card-text" data-sly-if="${model.cardText}">${model.cardText}</p>
            <a href="${model.buttonLink}" class="card-button" data-sly-if="${model.buttonLink && model.buttonText}">${model.buttonText}</a>
        </div>
    </div>
</sly>
<sly data-sly-call="${template.placeholder @ isEmpty=!hasContent}"></sly>
